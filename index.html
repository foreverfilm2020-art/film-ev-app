<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>フィルムEVアシスタント</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --card: #fffdf8;
      --text: #2f2a24;
      --muted: #746b60;
      --line: #ddd3c5;
      --accent: #4f7b62;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
      margin-bottom: 16px;
    }

    h1 {
      font-size: 1.6rem;
      margin: 0 0 8px;
    }

    h2 {
      font-size: 1.1rem;
      margin: 0 0 12px;
    }

    p {
      margin: 0 0 10px;
    }

    .muted {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .file-label {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 12px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-weight: 600;
      margin-bottom: 12px;
    }

    input[type="file"] {
      display: block;
      width: 100%;
      margin-top: 8px;
      font-size: 1rem;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: white;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .preview {
      width: 100%;
      max-height: 420px;
      object-fit: contain;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #f0ebe2;
      display: none;
      margin-top: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fffaf2;
    }

    .metric-title {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 1.4rem;
      font-weight: 800;
    }

    .result-box {
      white-space: pre-wrap;
      font-size: 1rem;
      background: #fffaf2;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      min-height: 140px;
    }

    .footer-note {
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 10px;
    }

    @media (max-width: 560px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>フィルムEVアシスタント</h1>
      <p class="muted">画像の明るさ差から、露出判断のヒントを出す試作版です。</p>
    </div>

    <div class="card">
      <h2>1. 写真を選ぶ</h2>
      <label for="imageInput" class="file-label">写真を選択</label>
      <input id="imageInput" type="file" accept="image/*,.heic,.heif" />
      <p id="fileName" class="muted">まだ画像が選ばれていません</p>
      <img id="preview" class="preview" alt="選択画像のプレビュー" />
    </div>

    <div class="card">
      <h2>2. 解析する</h2>
      <button id="analyzeBtn" disabled>解析する</button>
      <p class="footer-note">暗い部分EVと明るい部分EVは、画像内の相対EVです。絶対EVではありません。</p>
    </div>

    <div class="card">
      <h2>3. 結果</h2>
      <div class="grid">
        <div class="metric">
          <div class="metric-title">暗い部分EV</div>
          <div id="darkValue" class="metric-value">-</div>
        </div>
        <div class="metric">
          <div class="metric-title">明るい部分EV</div>
          <div id="brightValue" class="metric-value">-</div>
        </div>
        <div class="metric">
          <div class="metric-title">適正露出の目安</div>
          <div id="exposureGuide" class="metric-value" style="font-size:1rem;">-</div>
        </div>
        <div class="metric">
          <div class="metric-title">判定</div>
          <div id="sceneJudge" class="metric-value" style="font-size:1rem;">-</div>
        </div>
      </div>
      <div id="resultText" class="result-box" style="margin-top:12px;">ここに解析結果が表示されます。</div>
    </div>
  </div>

  <script>
    const imageInput = document.getElementById('imageInput');
    const fileName = document.getElementById('fileName');
    const preview = document.getElementById('preview');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const darkValue = document.getElementById('darkValue');
    const brightValue = document.getElementById('brightValue');
    const exposureGuideEl = document.getElementById('exposureGuide');
    const sceneJudge = document.getElementById('sceneJudge');
    const resultText = document.getElementById('resultText');

    let selectedFile = null;
    let currentObjectUrl = null;

    imageInput.addEventListener('change', function (event) {
      const file = event.target.files && event.target.files[0];

      if (!file) {
        fileName.textContent = '画像が選ばれませんでした';
        selectedFile = null;
        analyzeBtn.disabled = true;
        preview.style.display = 'none';
        return;
      }

      selectedFile = file;
      fileName.textContent = file.name + ' を選択中';
      analyzeBtn.disabled = false;

      if (currentObjectUrl) {
        URL.revokeObjectURL(currentObjectUrl);
      }

      currentObjectUrl = URL.createObjectURL(file);
      preview.src = currentObjectUrl;
      preview.style.display = 'block';
    });

    analyzeBtn.addEventListener('click', function () {
      if (!selectedFile || !preview.src) return;

      const img = new Image();
      img.onload = function () {
        analyzeImage(img);
      };
      img.src = preview.src;
    });

    function analyzeImage(img) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d', { willReadFrequently: true });

      const maxWidth = 800;
      const scale = Math.min(1, maxWidth / img.width);
      canvas.width = Math.max(1, Math.floor(img.width * scale));
      canvas.height = Math.max(1, Math.floor(img.height * scale));

      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;

      const luminances = [];
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];
        const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;
        luminances.push(lum);
      }

      luminances.sort((a, b) => a - b);

      const lowIndex = Math.floor(luminances.length * 0.1);
      const highIndex = Math.floor(luminances.length * 0.9);

      const dark = Math.max(1, luminances[lowIndex]);
      const bright = Math.max(dark + 1, luminances[highIndex]);
      const evDiff = Math.log2(bright / dark);

      const darkEV = toRelativeEV(dark);
      const brightEV = toRelativeEV(bright);
      const result = buildAdvice(evDiff);

      darkValue.textContent = formatEV(darkEV);
      brightValue.textContent = formatEV(brightEV);
      exposureGuideEl.textContent = result.exposureGuide;
      sceneJudge.textContent = result.judge;

      resultText.textContent =
`暗い部分EV：${formatEV(darkEV)}
明るい部分EV：${formatEV(brightEV)}

判定：${result.judge}

適正露出の目安：
${result.exposureGuide}

おすすめ：
${result.advice}`;
    }

    function toRelativeEV(value) {
      const midGray = 128;
      return Math.log2(value / midGray);
    }

    function formatEV(value) {
      return value >= 0 ? '+' + value.toFixed(1) : value.toFixed(1);
    }

    function buildAdvice(evDiff) {
      if (evDiff < 1.5) {
        return {
          judge: 'コントラスト弱め',
          exposureGuide: '補正なし前後でOK',
          advice: '・全体バランスで撮りやすい\n・大きな補正は不要\n・初心者でも安定しやすいシーン'
        };
      }

      if (evDiff < 2.5) {
        return {
          judge: 'やや差あり',
          exposureGuide: '顔優先なら +0.5〜1.0EV',
          advice: '・全体バランスならそのままでもOK\n・顔を優先するなら少し明るめ\n・背景の白飛びに少し注意'
        };
      }

      if (evDiff < 3.5) {
        return {
          judge: 'コントラスト強め',
          exposureGuide: '顔優先なら +1.0〜1.5EV',
          advice: '・顔優先なら少ししっかり明るめ\n・背景優先なら補正なし\n・木漏れ日や逆光では失敗しやすい'
        };
      }

      return {
        judge: 'かなり差が大きい',
        exposureGuide: '顔優先なら +1.5〜2.0EV',
        advice: '・顔優先でしっかり明るめが安全\n・背景は飛びやすい\n・ネガなら明るめ寄りが安全\n・重要な被写体を先に決めて撮るとよい'
      };
    }
  </script>
</body>
</html>
